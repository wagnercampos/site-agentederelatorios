<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>MOA.labs — Gerador de Relatórios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --preto: #0d0d0d;
    --laranja: #F26522;
    --coral: #E04040;
    --marrom: #3D1A0A;
    --teal: #4ECDC4;
    --cinza: #1a1a1a;
    --cinza2: #2a2a2a;
    --texto: #e8e8e8;
    --texto2: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--preto);
    color: var(--texto);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Barra lateral colorida */
  body::before {
    content: '';
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(to bottom, var(--laranja), var(--coral), var(--teal));
  }

  header {
    padding: 2rem 3rem;
    border-bottom: 1px solid #1f1f1f;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .logo-img {
    height: 56px;
    width: auto;
  }

  .divider {
    width: 1px;
    height: 32px;
    background: #2a2a2a;
    margin: 0 0.5rem;
  }

  .header-title {
    font-size: 13px;
    font-weight: 300;
    color: var(--texto2);
    letter-spacing: .04em;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
  }

  .card {
    background: var(--cinza);
    border: 1px solid #222;
    border-radius: 16px;
    width: 100%;
    max-width: 580px;
    overflow: hidden;
  }

  .card-header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid #222;
  }

  .card-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: .06em;
    color: #fff;
    margin-bottom: 6px;
  }

  .card-header p {
    font-size: 13px;
    color: var(--texto2);
    font-weight: 300;
    line-height: 1.6;
  }

  .formatos {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .formato-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: .04em;
  }

  .badge-pdf { background: rgba(242,101,34,.15); color: var(--laranja); border: 1px solid rgba(242,101,34,.3); }
  .badge-png { background: rgba(78,205,196,.15); color: var(--teal); border: 1px solid rgba(78,205,196,.3); }
  .badge-xlsx { background: rgba(224,64,64,.15); color: var(--coral); border: 1px solid rgba(224,64,64,.3); }

  .card-body {
    padding: 2rem 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .drop-zone {
    border: 1.5px dashed #333;
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--laranja);
    background: rgba(242,101,34,.04);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1rem;
  }

  .drop-icon svg { opacity: .6; }

  .drop-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--texto);
    margin-bottom: 4px;
  }

  .drop-sub {
    font-size: 12px;
    color: var(--texto2);
    font-weight: 300;
  }

  .file-preview {
    display: none;
    align-items: center;
    gap: 12px;
    background: #222;
    border-radius: 10px;
    padding: 12px 16px;
  }

  .file-preview.show { display: flex; }

  .file-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 11px; color: var(--texto2); margin-top: 2px; }

  .remove-btn {
    background: none;
    border: none;
    color: var(--texto2);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    transition: color .15s;
  }
  .remove-btn:hover { color: var(--coral); }

  .btn-gerar {
    width: 100%;
    padding: 14px;
    background: var(--laranja);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: .1em;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-gerar:hover { opacity: .9; }
  .btn-gerar:active { transform: scale(.99); }
  .btn-gerar:disabled { opacity: .4; cursor: not-allowed; }

  .status-box {
    display: none;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    align-items: center;
    gap: 10px;
  }

  .status-box.show { display: flex; }
  .status-box.loading { background: rgba(242,101,34,.08); border: 1px solid rgba(242,101,34,.2); color: var(--laranja); }
  .status-box.success { background: rgba(78,205,196,.08); border: 1px solid rgba(78,205,196,.2); color: var(--teal); }
  .status-box.error { background: rgba(224,64,64,.08); border: 1px solid rgba(224,64,64,.2); color: var(--coral); }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(242,101,34,.3);
    border-top-color: var(--laranja);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .resultado {
    display: none;
    flex-direction: column;
    gap: 12px;
  }

  .resultado.show { display: flex; }

  .metricas-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .metrica-card {
    background: #222;
    border-radius: 8px;
    padding: 12px 14px;
  }

  .metrica-label { font-size: 10px; color: var(--texto2); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .metrica-valor { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #fff; letter-spacing: .04em; }

  .btn-download {
    width: 100%;
    padding: 14px;
    background: var(--teal);
    color: var(--preto);
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: .1em;
    cursor: pointer;
    transition: opacity .2s;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-weight: 700;
  }

  .btn-download:hover { opacity: .9; }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--texto2);
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  .field-input {
    width: 100%;
    background: #222;
    border: 1.5px solid #333;
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--texto);
    outline: none;
    transition: border-color .2s;
  }

  .field-input::placeholder { color: #444; }
  .field-input:focus { border-color: var(--laranja); }

  .dots {
    display: flex;
    gap: 5px;
    margin-top: 4px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  footer {
    padding: 1.5rem 3rem;
    border-top: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  footer p { font-size: 11px; color: #444; font-weight: 300; }

  .dots-footer { display: flex; gap: 6px; }
  .dots-footer span { width: 7px; height: 7px; border-radius: 50%; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .card { animation: fadeIn .4s ease; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="logo.svg" alt="MOA.labs" class="logo-img">
    <div class="divider"></div>
    <div class="header-title">Gerador de Relatórios</div>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-header">
      <h1>ENVIAR RELATÓRIO</h1>
      <p>Suba o arquivo do relatório e o agente vai processar e gerar o PDF formatado automaticamente.</p>
      <div class="formatos">
        <span class="formato-badge badge-pdf">PDF</span>
        <span class="formato-badge badge-png">PNG / JPG</span>
        <span class="formato-badge badge-xlsx">XLSX / CSV</span>
      </div>
    </div>

    <div class="card-body">

      <div class="field-group">
        <label class="field-label" for="nomeCliente">Nome do cliente</label>
        <input type="text" class="field-input" id="nomeCliente" placeholder="Ex: Empresa XYZ">
      </div>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg,.xlsx,.xls,.csv">
        <div class="drop-icon">
          <svg width="22" height="22" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
          </svg>
        </div>
        <div class="drop-title">Arraste o arquivo aqui</div>
        <div class="drop-sub">ou clique para selecionar</div>
      </div>

      <div class="file-preview" id="filePreview">
        <div class="file-icon" id="fileIcon">📄</div>
        <div class="file-info">
          <div class="file-name" id="fileName">—</div>
          <div class="file-size" id="fileSize">—</div>
        </div>
        <button class="remove-btn" onclick="removerArquivo()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="status-box" id="statusBox">
        <div class="spinner" id="statusSpinner"></div>
        <span id="statusMsg">Processando...</span>
      </div>

      <button class="btn-gerar" id="btnGerar" onclick="processarArquivo()" disabled>
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        GERAR RELATÓRIO
      </button>

      <div class="resultado" id="resultado">
        <div class="metricas-grid" id="metricasGrid"></div>
        <a class="btn-download" id="btnDownload" href="#" download="relatorio-moa.pdf">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
          BAIXAR PDF
        </a>
      </div>

    </div>
  </div>
</main>

<footer>
  <p>MOA.labs © 2025 — Powered by Claude AI</p>
  <div class="dots-footer">
    <span style="background:#F26522"></span>
    <span style="background:#E04040"></span>
    <span style="background:#3D1A0A"></span>
    <span style="background:#4ECDC4"></span>
  </div>
</footer>

<script>
const API_KEY = 'SUA_API_KEY_AQUI';
let arquivoAtual = null;
let dadosExtraidos = null;

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const filePreview = document.getElementById('filePreview');
const btnGerar = document.getElementById('btnGerar');
const statusBox = document.getElementById('statusBox');
const resultado = document.getElementById('resultado');

// Drag and drop
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) selecionarArquivo(file);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) selecionarArquivo(e.target.files[0]);
});

function selecionarArquivo(file) {
  arquivoAtual = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = formatarTamanho(file.size);
  const ext = file.name.split('.').pop().toLowerCase();
  const icones = { pdf: '📄', png: '🖼️', jpg: '🖼️', jpeg: '🖼️', xlsx: '📊', xls: '📊', csv: '📊' };
  document.getElementById('fileIcon').textContent = icones[ext] || '📎';
  filePreview.classList.add('show');
  btnGerar.disabled = false;
  resultado.classList.remove('show');
  esconderStatus();
}

function removerArquivo() {
  arquivoAtual = null;
  filePreview.classList.remove('show');
  fileInput.value = '';
  btnGerar.disabled = true;
  resultado.classList.remove('show');
  esconderStatus();
}

function formatarTamanho(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function mostrarStatus(tipo, msg, spinner = false) {
  statusBox.className = 'status-box show ' + tipo;
  document.getElementById('statusSpinner').style.display = spinner ? 'block' : 'none';
  document.getElementById('statusMsg').textContent = msg;
}

function esconderStatus() {
  statusBox.className = 'status-box';
}

async function processarArquivo() {
  if (!arquivoAtual) return;

  btnGerar.disabled = true;
  resultado.classList.remove('show');
  mostrarStatus('loading', 'Lendo o arquivo...', true);

  try {
    const base64 = await fileParaBase64(arquivoAtual);
    const ext = arquivoAtual.name.split('.').pop().toLowerCase();
    const tipo = detectarTipo(ext);

    mostrarStatus('loading', 'Claude analisando os dados...', true);

    const conteudo = montarConteudo(base64, tipo, ext);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1500,
        messages: [{ role: 'user', content: conteudo }]
      })
    });

    const data = await response.json();

    if (!response.ok) throw new Error(data.error?.message || 'Erro na API');

    const texto = data.content[0].text;
    const jsonMatch = texto.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Não consegui extrair os dados do arquivo');

    dadosExtraidos = JSON.parse(jsonMatch[0]);

    mostrarStatus('loading', 'Gerando PDF...', true);
    await gerarPDF(dadosExtraidos);

    esconderStatus();
    mostrarResultado(dadosExtraidos);

  } catch (err) {
    mostrarStatus('error', '⚠ ' + err.message);
    btnGerar.disabled = false;
  }
}

function detectarTipo(ext) {
  if (ext === 'pdf') return 'pdf';
  if (['png','jpg','jpeg'].includes(ext)) return 'image';
  return 'text';
}

function montarConteudo(base64, tipo, ext) {
  const prompt = {
    type: 'text',
    text: `Você é um especialista em análise de relatórios de redes sociais. Analise este arquivo e extraia TODOS os dados disponíveis. Responda SOMENTE com um JSON válido nesta estrutura, sem texto adicional:
{
  "cliente": "nome do cliente ou conta",
  "periodo": "período do relatório",
  "rede_social": "plataforma (Instagram, Facebook, Meta Ads, Google Ads, etc)",
  "metricas": {
    "alcance": "valor ou null",
    "impressoes": "valor ou null",
    "engajamento": "valor ou null",
    "seguidores": "valor ou null",
    "taxa_engajamento": "valor% ou null",
    "cliques": "valor ou null",
    "conversoes": "valor ou null",
    "investimento": "valor ou null",
    "resultado_principal": "métrica mais importante e seu valor"
  },
  "destaques": ["ponto positivo 1", "ponto positivo 2"],
  "recomendacoes": ["recomendação 1", "recomendação 2"],
  "resumo": "resumo executivo em 2 linhas"
}`
  };

  if (tipo === 'pdf') {
    return [{ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } }, prompt];
  } else if (tipo === 'image') {
    const mimeMap = { png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg' };
    return [{ type: 'image', source: { type: 'base64', media_type: mimeMap[ext] || 'image/png', data: base64 } }, prompt];
  } else {
    return [{ type: 'text', text: 'Arquivo de dados:\n' + atob(base64) }, prompt];
  }
}

function fileParaBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function gerarPDF(dados) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, H = 297;

  // Fundo preto
  doc.setFillColor(13, 13, 13);
  doc.rect(0, 0, W, H, 'F');

  // Barra lateral laranja
  doc.setFillColor(242, 101, 34);
  doc.rect(0, 0, 4, H, 'F');

  // Cabeçalho
  doc.setFillColor(26, 26, 26);
  doc.rect(0, 0, W, 38, 'F');

  // Título MOA
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(26);
  doc.setTextColor(255, 255, 255);
  doc.text('MOA', 14, 22);
  doc.setTextColor(242, 101, 34);
  doc.text('.labs', 33, 22);

  // Subtítulo header
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(120, 120, 120);
  doc.text('RELATÓRIO DE DESEMPENHO', 14, 30);

  // Data
  const hoje = new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
  doc.setFontSize(8);
  doc.setTextColor(100, 100, 100);
  doc.text(hoje, W - 14, 22, { align: 'right' });

  // Linha separadora teal
  doc.setDrawColor(78, 205, 196);
  doc.setLineWidth(0.5);
  doc.line(14, 38, W - 14, 38);

  // Info principal
  let y = 52;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.setTextColor(255, 255, 255);
  doc.text((dados.cliente || 'Cliente').toUpperCase(), 14, y);

  y += 8;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(120, 120, 120);
  const redeSocial = dados.rede_social || '—';
  const periodo = dados.periodo || '—';
  doc.text(`${redeSocial}  ·  ${periodo}`, 14, y);

  // Linha divisória
  y += 8;
  doc.setDrawColor(40, 40, 40);
  doc.setLineWidth(0.3);
  doc.line(14, y, W - 14, y);

  // Seção métricas
  y += 10;
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setTextColor(242, 101, 34);
  doc.text('MÉTRICAS DE DESEMPENHO', 14, y);

  y += 6;
  const metricas = dados.metricas || {};
  const metricasList = [
    ['Alcance', metricas.alcance],
    ['Impressões', metricas.impressoes],
    ['Engajamento', metricas.engajamento],
    ['Taxa de Engajamento', metricas.taxa_engajamento],
    ['Seguidores', metricas.seguidores],
    ['Cliques', metricas.cliques],
    ['Conversões', metricas.conversoes],
    ['Investimento', metricas.investimento],
  ].filter(m => m[1] && m[1] !== 'null');

  const colW = (W - 28 - 6) / 2;
  metricasList.forEach((m, i) => {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const mx = 14 + col * (colW + 6);
    const my = y + row * 22;

    doc.setFillColor(26, 26, 26);
    doc.roundedRect(mx, my, colW, 18, 3, 3, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(100, 100, 100);
    doc.text(m[0].toUpperCase(), mx + 5, my + 6);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(255, 255, 255);
    doc.text(String(m[1]), mx + 5, my + 14);
  });

  y += Math.ceil(metricasList.length / 2) * 22 + 8;

  // Resultado principal
  if (metricas.resultado_principal) {
    doc.setFillColor(242, 101, 34, 0.15);
    doc.setFillColor(40, 20, 5);
    doc.roundedRect(14, y, W - 28, 16, 3, 3, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(242, 101, 34);
    doc.text('RESULTADO PRINCIPAL', 20, y + 6);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(255, 255, 255);
    doc.text(String(metricas.resultado_principal), 20, y + 12);
    y += 22;
  }

  // Destaques
  if (dados.destaques && dados.destaques.length) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(78, 205, 196);
    doc.text('DESTAQUES', 14, y);
    y += 5;
    dados.destaques.slice(0,3).forEach(d => {
      doc.setFillColor(20, 30, 30);
      doc.roundedRect(14, y, W - 28, 10, 2, 2, 'F');
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(78, 205, 196);
      doc.text('▸', 18, y + 6.5);
      doc.setTextColor(200, 200, 200);
      const txt = doc.splitTextToSize(String(d), W - 46);
      doc.text(txt[0], 24, y + 6.5);
      y += 12;
    });
  }

  y += 4;

  // Recomendações
  if (dados.recomendacoes && dados.recomendacoes.length) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(224, 64, 64);
    doc.text('RECOMENDAÇÕES', 14, y);
    y += 5;
    dados.recomendacoes.slice(0,3).forEach(r => {
      doc.setFillColor(28, 18, 18);
      doc.roundedRect(14, y, W - 28, 10, 2, 2, 'F');
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      doc.setTextColor(224, 64, 64);
      doc.text('→', 18, y + 6.5);
      doc.setTextColor(200, 200, 200);
      const txt = doc.splitTextToSize(String(r), W - 46);
      doc.text(txt[0], 24, y + 6.5);
      y += 12;
    });
  }

  // Resumo
  if (dados.resumo) {
    y += 4;
    doc.setFillColor(26, 26, 26);
    doc.roundedRect(14, y, W - 28, 22, 3, 3, 'F');
    doc.setDrawColor(242, 101, 34);
    doc.setLineWidth(1);
    doc.line(14, y, 14, y + 22);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7);
    doc.setTextColor(242, 101, 34);
    doc.text('RESUMO EXECUTIVO', 20, y + 6);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(180, 180, 180);
    const resumoTxt = doc.splitTextToSize(String(dados.resumo), W - 48);
    doc.text(resumoTxt.slice(0,2), 20, y + 12);
  }

  // Rodapé
  doc.setFillColor(20, 20, 20);
  doc.rect(0, H - 14, W, 14, 'F');
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7);
  doc.setTextColor(60, 60, 60);
  doc.text('MOA.labs — Relatório gerado automaticamente por IA', 14, H - 5);
  doc.setTextColor(242, 101, 34);
  doc.text('agenciamoa.com.br', W - 14, H - 5, { align: 'right' });

  // Pontos coloridos rodapé
  const cores = [[242,101,34],[224,64,64],[61,26,10],[78,205,196]];
  cores.forEach((c, i) => {
    doc.setFillColor(...c);
    doc.circle(W - 14 - (cores.length - 1 - i) * 8, H - 9, 2.5, 'F');
  });

  const pdfBlob = doc.output('blob');
  const url = URL.createObjectURL(pdfBlob);
  document.getElementById('btnDownload').href = url;
  document.getElementById('btnDownload').download = `relatorio-${(dados.cliente || 'moa').toLowerCase().replace(/\s+/g,'-')}.pdf`;
}

function mostrarResultado(dados) {
  const grid = document.getElementById('metricasGrid');
  const metricas = dados.metricas || {};
  const pares = [
    ['Alcance', metricas.alcance],
    ['Engajamento', metricas.engajamento],
    ['Impressões', metricas.impressoes],
    ['Taxa Eng.', metricas.taxa_engajamento],
  ].filter(m => m[1] && m[1] !== 'null');

  grid.innerHTML = pares.map(([label, val]) => `
    <div class="metrica-card">
      <div class="metrica-label">${label}</div>
      <div class="metrica-valor">${val}</div>
    </div>
  `).join('');

  resultado.classList.add('show');
  btnGerar.disabled = false;
}
</script>
