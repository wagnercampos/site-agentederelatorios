<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Gerador de Relatórios — MOA.labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #3ec6c3; --orange: #ff691d; --dark: #1b1b1b;
      --white: #f5f5f5; --bg: #f7f7f5; --border: #e2e2dc;
    }
    body { font-family: 'Space Mono', monospace; background: var(--bg); color: var(--dark); min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--dark);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid #2a2a2a;
    }
    .logo-img { height: 64px; width: auto; display: block; }
    .divider { width: 1px; height: 28px; background: #333; }
    .header-title {
      font-family: 'Anton', sans-serif;
      font-size: 15px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #888;
    }

    /* ── MAIN ── */
    .container {
      max-width: 760px;
      margin: 48px auto;
      padding: 0 24px 80px;
    }
    .page-title {
      font-family: 'Anton', sans-serif;
      font-size: 32px;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .page-sub {
      font-size: 12px;
      color: #888;
      margin-bottom: 40px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── SECTIONS ── */
    .form-section {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 28px 28px 24px;
      margin-bottom: 20px;
    }
    .form-section-title {
      font-family: 'Anton', sans-serif;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #aaa;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* ── GRID ── */
    .field-row { display: grid; gap: 16px; margin-bottom: 16px; }
    .field-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .field-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .field-row:last-child { margin-bottom: 0; }

    /* ── FIELDS ── */
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      font-weight: 700;
    }
    .field-input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--dark);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: var(--teal); background: #fff; }
    .field-input::placeholder { color: #bbb; }

    /* ── TOP POSTS ── */
    .post-block {
      border: 1.5px solid var(--border);
      border-radius: 3px;
      padding: 16px 16px 12px;
      margin-bottom: 12px;
      background: var(--bg);
    }
    .post-block:last-child { margin-bottom: 0; }
    .post-block-title {
      font-family: 'Anton', sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--teal);
      margin-bottom: 12px;
    }

    /* ── SUBMIT ── */
    .btn-gerar {
      width: 100%;
      padding: 16px;
      background: var(--dark);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-family: 'Anton', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn-gerar:hover { background: #2a2a2a; }
    .btn-gerar:disabled { background: #888; cursor: not-allowed; }

    /* ── LOADING ── */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(27,27,27,0.88);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Anton', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Gerando relatório com IA...</div>
  </div>

  <header>
    <img src="logo.svg" alt="MOA.labs" class="logo-img">
    <div class="divider"></div>
    <div class="header-title">Gerador de Relatórios</div>
  </header>

  <div class="container">
    <div class="page-title">Novo Relatório</div>
    <div class="page-sub">Preencha os dados do cliente e as métricas do período</div>

    <form id="reportForm">

      <!-- DADOS DO CLIENTE -->
      <div class="form-section">
        <div class="form-section-title">Dados do Cliente</div>
        <div class="field-row cols-2">
          <div class="field-group">
            <label class="field-label" for="nomeCliente">Nome do cliente</label>
            <input type="text" class="field-input" id="nomeCliente" placeholder="Ex: Bella Moda Boutique" required>
          </div>
          <div class="field-group">
            <label class="field-label" for="handle">Instagram</label>
            <input type="text" class="field-input" id="handle" placeholder="@cliente" required>
          </div>
        </div>
        <div class="field-row cols-2">
          <div class="field-group">
            <label class="field-label" for="segmento">Segmento / Nicho</label>
            <input type="text" class="field-input" id="segmento" placeholder="Ex: Moda Feminina">
          </div>
          <div class="field-group">
            <label class="field-label" for="periodo">Período</label>
            <input type="text" class="field-input" id="periodo" placeholder="Ex: Março de 2026" required>
          </div>
        </div>
      </div>

      <!-- MÉTRICAS -->
      <div class="form-section">
        <div class="form-section-title">Métricas do Período</div>
        <div class="field-row cols-3">
          <div class="field-group">
            <label class="field-label" for="seguidores">Seguidores (total)</label>
            <input type="text" class="field-input" id="seguidores" placeholder="Ex: 12.847" required>
          </div>
          <div class="field-group">
            <label class="field-label" for="seg_var">Novos seguidores</label>
            <input type="text" class="field-input" id="seg_var" placeholder="Ex: +342">
          </div>
          <div class="field-group">
            <label class="field-label" for="seg_pct">Variação %</label>
            <input type="text" class="field-input" id="seg_pct" placeholder="Ex: +2,7%">
          </div>
        </div>
        <div class="field-row cols-2">
          <div class="field-group">
            <label class="field-label" for="alcance">Alcance total</label>
            <input type="text" class="field-input" id="alcance" placeholder="Ex: 48.320">
          </div>
          <div class="field-group">
            <label class="field-label" for="impressoes">Impressões</label>
            <input type="text" class="field-input" id="impressoes" placeholder="Ex: 76.540">
          </div>
        </div>
        <div class="field-row cols-3">
          <div class="field-group">
            <label class="field-label" for="engajamento">Engajamento médio</label>
            <input type="text" class="field-input" id="engajamento" placeholder="Ex: 4,2%">
          </div>
          <div class="field-group">
            <label class="field-label" for="posts">Posts publicados</label>
            <input type="text" class="field-input" id="posts" placeholder="Ex: 18">
          </div>
          <div class="field-group">
            <label class="field-label" for="visitas">Visitas ao perfil</label>
            <input type="text" class="field-input" id="visitas" placeholder="Ex: 2.156">
          </div>
        </div>
        <div class="field-row cols-2">
          <div class="field-group">
            <label class="field-label" for="cliques">Cliques no link</label>
            <input type="text" class="field-input" id="cliques" placeholder="Ex: 387">
          </div>
          <div class="field-group">
            <label class="field-label" for="stories">Views de Stories</label>
            <input type="text" class="field-input" id="stories" placeholder="Ex: 18.430">
          </div>
        </div>
      </div>

      <!-- TOP POSTS -->
      <div class="form-section">
        <div class="form-section-title">Top 3 Posts do Período</div>

        <div class="post-block">
          <div class="post-block-title">Post 1</div>
          <div class="field-row cols-2">
            <div class="field-group">
              <label class="field-label">Legenda / Título</label>
              <input type="text" class="field-input p-caption" placeholder="Ex: Look verão completo 🌸">
            </div>
            <div class="field-group">
              <label class="field-label">Tipo</label>
              <input type="text" class="field-input p-tipo" placeholder="Ex: Carrossel, Reels, Foto">
            </div>
          </div>
          <div class="field-row cols-3">
            <div class="field-group">
              <label class="field-label">Curtidas</label>
              <input type="text" class="field-input p-curtidas" placeholder="Ex: 1.247">
            </div>
            <div class="field-group">
              <label class="field-label">Comentários</label>
              <input type="text" class="field-input p-comentarios" placeholder="Ex: 89">
            </div>
            <div class="field-group">
              <label class="field-label">Engajamento</label>
              <input type="text" class="field-input p-engajamento" placeholder="Ex: 6,1%">
            </div>
          </div>
        </div>

        <div class="post-block">
          <div class="post-block-title">Post 2</div>
          <div class="field-row cols-2">
            <div class="field-group">
              <label class="field-label">Legenda / Título</label>
              <input type="text" class="field-input p-caption" placeholder="Ex: Nova coleção chegou!">
            </div>
            <div class="field-group">
              <label class="field-label">Tipo</label>
              <input type="text" class="field-input p-tipo" placeholder="Ex: Reels">
            </div>
          </div>
          <div class="field-row cols-3">
            <div class="field-group">
              <label class="field-label">Curtidas</label>
              <input type="text" class="field-input p-curtidas" placeholder="Ex: 1.103">
            </div>
            <div class="field-group">
              <label class="field-label">Comentários</label>
              <input type="text" class="field-input p-comentarios" placeholder="Ex: 52">
            </div>
            <div class="field-group">
              <label class="field-label">Engajamento</label>
              <input type="text" class="field-input p-engajamento" placeholder="Ex: 5,7%">
            </div>
          </div>
        </div>

        <div class="post-block">
          <div class="post-block-title">Post 3</div>
          <div class="field-row cols-2">
            <div class="field-group">
              <label class="field-label">Legenda / Título</label>
              <input type="text" class="field-input p-caption" placeholder="Ex: Promoção relâmpago 48h">
            </div>
            <div class="field-group">
              <label class="field-label">Tipo</label>
              <input type="text" class="field-input p-tipo" placeholder="Ex: Foto">
            </div>
          </div>
          <div class="field-row cols-3">
            <div class="field-group">
              <label class="field-label">Curtidas</label>
              <input type="text" class="field-input p-curtidas" placeholder="Ex: 987">
            </div>
            <div class="field-group">
              <label class="field-label">Comentários</label>
              <input type="text" class="field-input p-comentarios" placeholder="Ex: 143">
            </div>
            <div class="field-group">
              <label class="field-label">Engajamento</label>
              <input type="text" class="field-input p-engajamento" placeholder="Ex: 5,2%">
            </div>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-gerar" id="btnGerar">Gerar Relatório com IA</button>

    </form>
  </div>

  <script>
    const form    = document.getElementById('reportForm');
    const btn     = document.getElementById('btnGerar');
    const overlay = document.getElementById('loadingOverlay');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      overlay.classList.add('active');

      const postBlocks = document.querySelectorAll('.post-block');
      const topPosts = Array.from(postBlocks).map(block => ({
        caption:     block.querySelector('.p-caption').value,
        tipo:        block.querySelector('.p-tipo').value,
        curtidas:    block.querySelector('.p-curtidas').value,
        comentarios: block.querySelector('.p-comentarios').value,
        engajamento: block.querySelector('.p-engajamento').value,
      })).filter(p => p.caption.trim() !== '');

      const payload = {
        cliente:     document.getElementById('nomeCliente').value,
        handle:      document.getElementById('handle').value,
        segmento:    document.getElementById('segmento').value,
        periodo:     document.getElementById('periodo').value,
        seguidores:  document.getElementById('seguidores').value,
        seg_var:     document.getElementById('seg_var').value,
        seg_pct:     document.getElementById('seg_pct').value,
        alcance:     document.getElementById('alcance').value,
        impressoes:  document.getElementById('impressoes').value,
        engajamento: document.getElementById('engajamento').value,
        posts:       document.getElementById('posts').value,
        visitas:     document.getElementById('visitas').value,
        cliques:     document.getElementById('cliques').value,
        stories:     document.getElementById('stories').value,
        top_posts:   topPosts,
      };

      try {
        const res = await fetch('gerar-relatorio.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) throw new Error(await res.text());

        const html = await res.text();
        const win = window.open('', '_blank');
        win.document.open();
        win.document.write(html);
        win.document.close();
      } catch (err) {
        alert('Erro ao gerar relatório: ' + err.message);
      } finally {
        btn.disabled = false;
        overlay.classList.remove('active');
      }
    });
  </script>
</body>
</html>
